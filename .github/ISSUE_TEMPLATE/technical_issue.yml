name: Technical Issue
description: Backend, API, performance, or infrastructure issues
title: "[TECH] "
labels: ["technical"]

body:
  - type: input
    id: component
    attributes:
      label: Component
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Issue Description
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Errors

  - type: input
    id: environment
    attributes:
      label: Environment

  - type: input
    id: version
    attributes:
      label: Version
      description: Version at the time of discovery
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Info