name: Bug Report
description: Report a bug, crash, or unexpected behavior.
title: "[BUG] "
labels:

* bug

body:

* type: markdown
  attributes:
  value: |
  Thanks for taking the time to report a bug.

* type: input
  id: summary
  attributes:
  label: Summary
  description: Briefly describe the issue.
  placeholder: The game crashes when...
  validations:
  required: true

* type: textarea
  id: steps
  attributes:
  label: Steps to Reproduce
  description: Tell us how to reproduce the issue.
  placeholder: |
  1. Open...
  2. Click...
  3. Observe...
  validations:
  required: true

* type: textarea
  id: expected
  attributes:
  label: Expected Behavior
  validations:
  required: true

* type: textarea
  id: actual
  attributes:
  label: Actual Behavior
  validations:
  required: true

* type: input
  id: version
  attributes:
  label: Version
  placeholder: v1.2.3

* type: textarea
  id: logs
  attributes:
  label: Screenshots / Logs
  description: Paste any logs or attach screenshots here.
